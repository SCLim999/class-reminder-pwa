<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e293b">
<link rel="manifest" href="manifest.json">
<title>Class Reminder — Settings</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0f172a;
    --surface: #1e293b;
    --border:  #334155;
    --text:    #e2e8f0;
    --sub:     #94a3b8;
    --muted:   #7a8da0;
    --blue:    #2563eb;
    --blue-h:  #1d4ed8;
    --radius:  12px;
  }

  html { background: var(--bg); }

  body {
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn {
    background: none; border: none; color: #60a5fa;
    font-size: 15px; font-weight: 600; cursor: pointer;
    padding: 4px 0; font-family: inherit; min-height: 40px;
  }
  .page-title { font-size: 16px; font-weight: 700; color: #f1f5f9; }

  .container { max-width: 560px; margin: 0 auto; padding: 20px 16px 0; }

  /* Cards */
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 18px 16px; margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 11px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
  }

  label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; }
  .hint {
    font-size: 12px; color: var(--muted);
    margin-top: 4px; line-height: 1.5;
  }
  .hint a { color: var(--blue); text-decoration: none; }

  input[type="text"],
  input[type="number"] {
    width: 100%; padding: 11px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: 14px;
    outline: none; transition: border .15s;
    margin-bottom: 14px; -webkit-appearance: none;
  }
  input:focus { border-color: var(--blue); }

  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }

  code {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 7px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 12px; color: #60a5fa;
    word-break: break-all;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .btn {
    flex: 1; padding: 13px; border: none; border-radius: var(--radius);
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .15s; min-height: 48px;
  }
  .btn-save  { background: var(--blue); color: white; }
  .btn-save:hover, .btn-save:active { background: var(--blue-h); }
  .btn-reset {
    background: var(--surface); color: var(--muted);
    border: 1px solid var(--border); flex: 0 0 auto; padding: 13px 18px;
  }
  .btn-reset:hover, .btn-reset:active { background: var(--border); color: var(--sub); }

  /* Contrast (light) mode */
  body.contrast {
    --bg: #f8fafc; --surface: #ffffff; --border: #cbd5e1;
    --text: #0f172a; --sub: #334155; --muted: #475569;
    --blue: #1d4ed8; --blue-h: #1e40af;
  }
  body.contrast input[type="text"],
  body.contrast input[type="number"] { background: #f8fafc; border-color: #cbd5e1; color: #0f172a; }
  body.contrast .card   { background: #ffffff; border-color: #e2e8f0; }
  body.contrast code    { background: #f1f5f9; border-color: #cbd5e1; color: #1d4ed8; }
  body.contrast .btn-reset { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }
  body.contrast .header { background: #ffffff; border-bottom-color: #e2e8f0; }
  body.contrast .page-title { color: #0f172a; }
  body.contrast .back-btn { color: #1d4ed8; }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(24px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: #15803d; color: white;
    padding: 11px 22px; border-radius: 10px; font-size: 13.5px; font-weight: 600;
    opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="back-btn">‹ Back</button>
  <div class="page-title">⚙️ Settings</div>
</div>

<div class="container">

  <!-- Google OAuth -->
  <div class="card">
    <div class="card-title">Google Calendar API</div>
    <label for="clientId">OAuth Client ID</label>
    <input type="text" id="clientId" placeholder="xxxxxxxxxxxx.apps.googleusercontent.com"
           autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="hint">
      Create a <strong>Web application</strong> OAuth client in
      <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a>.
      Add this as an Authorized Redirect URI:<br><br>
      <code id="redirectUri">—</code>
    </div>
  </div>

  <!-- Keywords -->
  <div class="card">
    <div class="card-title">Class Keywords</div>
    <label for="keywords">Keywords (comma-separated)</label>
    <input type="text" id="keywords" placeholder="lecture, tutorial, lab"
           autocorrect="off" spellcheck="false">
    <div class="hint">Events whose title contains any of these words will get reminders.</div>
  </div>

  <!-- Timing -->
  <div class="card">
    <div class="card-title">Reminder Timing</div>
    <div class="row">
      <div>
        <label>First reminder (min before)</label>
        <input type="number" id="remind1" min="1" max="120" value="30">
      </div>
      <div>
        <label>Second reminder (min before)</label>
        <input type="number" id="remind2" min="1" max="120" value="10">
      </div>
    </div>
    <label>Auto-close overlay after (seconds)</label>
    <input type="number" id="autoclose" min="5" max="120" value="30">
  </div>

  <div class="btn-row">
    <button class="btn btn-save"  id="saveBtn">Save Settings</button>
    <button class="btn btn-reset" id="resetBtn">Reset</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="settings.js"></script>
</body>
</html>
